[general]
live_config_reload = true
import = ["~/.config/alacritty/themes/themes/solarized_light.toml"]

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 80, lines = 40 }
padding = { x = 0, y = 0 }
decorations = "Full"
opacity = 0.9
blur = true

[scrolling]
history = 100000
multiplier = 3

[font]
size = 12.0
offset = { x = 0, y = 0 }
normal = { family = "MesloLGL Nerd Font Mono", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }

[cursor]
style = { shape = "Block", blinking = "On" }

[mouse]
hide_when_typing = false

[keyboard]
bindings = [
  { key = "N", mods = "Control | Shift", action = "CreateNewWindow" },
  { key = "F", mods = "Control | Shift", action = "ToggleFullscreen" },
]
